<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#2563eb">
    <title>House Expense Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: {} }
        }
    </script>
    <style>
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; color: black !important; }
        }
        /* Mobile-first touch optimization */
        button, select, input { min-height: 48px; }
        body { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-full transition-colors duration-300">

    <div id="app" class="pb-24 flex flex-col min-h-screen">
        <header class="p-4 flex justify-between items-center bg-white dark:bg-gray-800 shadow-sm sticky top-0 z-50">
            <h1 class="text-xl font-bold truncate">Expense Manager</h1>
            <button onclick="toggleTheme()" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700 min-h-[44px] min-w-[44px]">
                <span id="theme-icon">🌙</span>
            </button>
        </header>

        <main id="main-content" class="p-4 flex-grow w-full max-w-lg mx-auto">
            <!-- Dynamic content injected here -->
        </main>

        <nav class="fixed bottom-0 w-full bg-white dark:bg-gray-800 border-t dark:border-gray-700 flex justify-around p-2 shadow-lg z-40 no-print">
            <button onclick="changeView('dashboard')" class="flex flex-col items-center p-2 min-h-[48px] min-w-[48px]"><span class="text-[10px] uppercase font-bold">Home</span></button>
            <button onclick="changeView('add')" class="flex flex-col items-center p-2 min-h-[48px] min-w-[48px]"><span class="text-[10px] uppercase font-bold">Add</span></button>
            <button onclick="changeView('list')" class="flex flex-col items-center p-2 min-h-[48px] min-w-[48px]"><span class="text-[10px] uppercase font-bold">List</span></button>
            <button onclick="changeView('history')" class="flex flex-col items-center p-2 min-h-[48px] min-w-[48px]"><span class="text-[10px] uppercase font-bold">History</span></button>
            <button onclick="changeView('purchasers')" class="flex flex-col items-center p-2 min-h-[48px] min-w-[48px]"><span class="text-[10px] uppercase font-bold">User</span></button>
        </nav>
    </div>

    <script>
        let expenses = JSON.parse(localStorage.getItem('expenses')) || [];
        let purchasers = JSON.parse(localStorage.getItem('purchasers')) || ['Self'];
        let history = JSON.parse(localStorage.getItem('history')) || [];
        let currentView = 'dashboard';
        let isDarkMode = localStorage.getItem('theme') === 'dark';

        if (isDarkMode) document.documentElement.classList.add('dark');

        function toggleTheme() {
            isDarkMode = !isDarkMode;
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDarkMode ? 'dark' : 'light');
            document.getElementById('theme-icon').innerText = isDarkMode ? '☀️' : '🌙';
        }

        const quickItems = [
            { name: 'Milk', category: 'Dairy' },
            { name: 'Bread', category: 'Grocery' },
            { name: 'Eggs', category: 'Grocery' },
            { name: 'Vegetables', category: 'Vegetables' }
        ];

        function saveData() {
            localStorage.setItem('expenses', JSON.stringify(expenses));
            localStorage.setItem('purchasers', JSON.stringify(purchasers));
            localStorage.setItem('history', JSON.stringify(history));
        }

        function changeView(view) {
            currentView = view;
            render();
        }

        function render() {
            const main = document.getElementById('main-content');
            main.innerHTML = '';
            if (currentView === 'dashboard') renderDashboard(main);
            else if (currentView === 'add') renderAdd(main);
            else if (currentView === 'list') renderList(main);
            else if (currentView === 'history') renderHistory(main);
            else if (currentView === 'purchasers') renderPurchasers(main);
        }

        function renderDashboard(container) {
            const total = expenses.reduce((sum, e) => sum + parseFloat(e.price || 0), 0);
            const cats = ['Grocery', 'Dairy', 'Vegetables', 'Cleaning', 'Other'];
            container.innerHTML = `
                <div class="p-6 bg-blue-600 text-white rounded-3xl shadow-lg mb-6">
                    <p class="text-sm opacity-80">Total Monthly Spend</p>
                    <h2 class="text-4xl font-bold">₹${total.toFixed(2)}</h2>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    ${cats.map(c => {
                        const sum = expenses.filter(e => e.category === c).reduce((s, e) => s + parseFloat(e.price || 0), 0);
                        return `<div class="p-4 bg-white dark:bg-gray-800 border dark:border-gray-700 rounded-2xl shadow-sm">
                                    <p class="text-[10px] uppercase opacity-60 font-bold">${c}</p>
                                    <p class="font-bold text-lg">₹${sum.toFixed(2)}</p>
                                </div>`;
                    }).join('')}
                </div>`;
        }

        function renderAdd(container) {
            container.innerHTML = `
                <div class="space-y-6">
                    <div class="space-y-4 bg-white dark:bg-gray-800 p-4 rounded-2xl shadow-sm">
                        <h3 class="font-bold text-lg">Add New Expense</h3>
                        <input id="prod-name" class="w-full p-4 rounded-xl border bg-gray-50 dark:bg-gray-700" placeholder="Product Name">
                        <input id="prod-price" type="number" class="w-full p-4 rounded-xl border bg-gray-50 dark:bg-gray-700" placeholder="Price (₹)">
                        <select id="prod-cat" class="w-full p-4 rounded-xl border bg-gray-50 dark:bg-gray-700">
                            <option value="Grocery">Grocery</option><option value="Dairy">Dairy</option>
                            <option value="Vegetables">Vegetables</option><option value="Cleaning">Cleaning</option>
                            <option value="Other">Other</option>
                        </select>
                        <select id="prod-purchaser" class="w-full p-4 rounded-xl border bg-gray-50 dark:bg-gray-700">
                            ${purchasers.map(p => `<option value="${p}">${p}</option>`).join('')}
                        </select>
                        <button onclick="addExpense()" class="w-full bg-blue-600 text-white p-4 rounded-xl font-bold">Add Item</button>
                    </div>
                </div>`;
        }

        function addExpense() {
            const name = document.getElementById('prod-name').value;
            const price = document.getElementById('prod-price').value;
            const category = document.getElementById('prod-cat').value;
            const purchaser = document.getElementById('prod-purchaser').value;
            if(!name || !price) return;
            expenses.push({ id: Date.now(), name, price, category, purchaser });
            saveData(); changeView('list');
        }

        function finalizeMonth() {
            if(expenses.length === 0) return;
            const monthYear = new Date().toLocaleString('default', { month: 'long', year: 'numeric' });
            history.push({ monthYear, total: expenses.reduce((s, e) => s + parseFloat(e.price), 0), date: new Date().getTime() });
            expenses = [];
            saveData(); changeView('history');
        }

        function deleteExpense(id) {
            expenses = expenses.filter(e => e.id !== id);
            saveData(); render();
        }

        function renderList(container) {
            const total = expenses.reduce((sum, e) => sum + parseFloat(e.price || 0), 0);
            container.innerHTML = `
                <div class="bg-white dark:bg-gray-800 p-4 rounded-2xl shadow-sm mb-4">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="font-bold">Total: ₹${total.toFixed(2)}</h2>
                        <button onclick="window.print()" class="bg-gray-200 dark:bg-gray-700 px-3 py-1 rounded-lg text-sm font-bold">Print</button>
                    </div>
                    <button onclick="finalizeMonth()" class="w-full bg-green-600 text-white py-2 rounded-xl font-bold">Finalize Month</button>
                </div>
                ${expenses.map(e => `
                    <div class="flex justify-between items-center p-4 bg-white dark:bg-gray-800 rounded-xl shadow-sm mb-2">
                        <div><p class="font-bold">${e.name}</p><p class="text-[10px] opacity-60">${e.category} • ${e.purchaser}</p></div>
                        <div class="flex items-center gap-4">
                            <p class="font-bold">₹${parseFloat(e.price).toFixed(2)}</p>
                            <button onclick="deleteExpense(${e.id})" class="text-red-500 p-2">Delete</button>
                        </div>
                    </div>`).join('')}`;
        }

        function renderHistory(container) {
            container.innerHTML = `<h3 class="font-bold text-lg mb-4">Past History</h3>
                <div class="space-y-4">
                    ${history.map(h => `
                        <div class="bg-white dark:bg-gray-800 p-4 rounded-xl shadow-sm">
                            <div class="flex justify-between items-center mb-2">
                                <span class="font-bold">${h.monthYear}</span>
                                <span class="font-bold text-blue-500">₹${h.total.toFixed(2)}</span>
                            </div>
                            <button onclick="window.print()" class="w-full bg-gray-100 dark:bg-gray-700 py-1 rounded text-sm">Print Report</button>
                        </div>`).join('') || '<p class="opacity-50">No history saved yet.</p>'}
                </div>`;
        }

        function renderPurchasers(container) {
            container.innerHTML = `
                <div class="space-y-4">
                    <h3 class="font-bold text-lg">Manage Purchasers</h3>
                    <div class="flex gap-2">
                        <input id="new-p" class="flex-1 p-4 rounded-xl border bg-gray-50 dark:bg-gray-700" placeholder="Name">
                        <button onclick="addPurchaser()" class="bg-green-600 text-white px-6 rounded-xl font-bold">+</button>
                    </div>
                    ${purchasers.map(p => `
                        <div class="flex justify-between bg-white dark:bg-gray-800 p-4 rounded-xl shadow-sm">
                            ${p} <button onclick="deletePurchaser('${p}')" class="text-red-500 font-bold">Remove</button>
                        </div>`).join('')}
                </div>`;
        }

        function addPurchaser() {
            const name = document.getElementById('new-p').value;
            if(name && !purchasers.includes(name)) { purchasers.push(name); saveData(); render(); }
        }

        function deletePurchaser(p) {
            purchasers = purchasers.filter(x => x !== p); saveData(); render();
        }

        render();
    </script>
</body>
</html>
